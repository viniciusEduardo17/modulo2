<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>

        /* Elemento do tipo box-level */
        h1{ 
            background-color:rgb(230, 230, 230);
            height:300px;
            width:300px;

            /* border-width: 10px;
            border-style:solid;
            border-color:brown; */

            /* shorthand para bordas*/
            border: 10px solid rgb(23, 44, 44);

            /* padding-top: 10px;
            padding-right:10px;
            padding-bottom: 10px;
            padding-left: 10px; */

            /* shorthand para padding, se for tudo igual, somente colocar "padding"*/
            padding: 10px;

            /* centraliza todo elemento */
            /* margin: auto; */

            /* margin-top:20px;
            margin-right:20px;
            margin-bottom:40px;
            margin-left: 20px; */

            /* shorthand para padding, */
            margin: 20px auto 40px auto;

            
            /* outline-width:5px;
            outline-style:dashed;
            outline-color: salmon; */

            /* shorthand para padding, */
            outline: 5px dashed salmon;
           
        }

        /* Elemento do tipo inline-level */
        a{
            border-width: 10px;
            border-style: solid;
            border-color:red;

            padding-top: 10px;
            padding-right:10px;
            padding-bottom: 10px;
            padding-left: 10px;
        }
    </style>
</head>
<body>
    
        <h1>Exemplo de caixa box-level</h1>
        <p>Parágrafos também são exemplos de box-level, mas os <a href="#">links são exemplo de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
    
</body>
</html>
