<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Hover</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        /* está esconcendo o "p" dentro que está dentro da div */
        div > p{
            display: none;
        }

        /* Mostra o parágrafo escondido dentro da div*/
        div:hover > p{
            display:block;
            color:white;
            background-color: red;
            width: 170px;
            font-weight:bold;
        }

        div:hover{
            color: red;
        }
    </style>
</head>
<body>
    <h1>Exemplo de hover</h1>
    <p>Passe o mouse sobre o texto abaixo.</p>

    <div>
        Passe o mouse aqui
        <p>TEXTO ESCONDIDO...</p>
    </div>

    <p>Fim do exemplo</p>
    
    <p><a href="pseudoclasse.html">VOLTAR PARA A PÁGINA INÍCIAL</a></p>
    
</body>
</html>
